<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
  }
</script>
<style>
  .eye-icon {
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .eye-closed {
    transform: rotateX(180deg);
    opacity: 0.5;
  }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-900 transition-colors duration-500">


<div class="absolute top-4 right-4">
  <button id="theme-toggle" class="px-4 py-2 bg-gray-300 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg">🌙</button>
</div>

<div class="w-full max-w-md p-8 bg-white dark:bg-gray-800 rounded-xl shadow-md transition-colors duration-500">
  <h2 class="text-2xl font-bold mb-6 text-center text-gray-900 dark:text-gray-100">Reset Your Password</h2>
  <form id="reset-form" class="space-y-4">
    
   
    <div class="relative">
      <input type="password" id="new-password" placeholder="New Password" class="w-full px-4 py-2 border rounded-lg dark:bg-gray-700 dark:text-gray-100 border-gray-300 dark:border-gray-600" required>
      <button type="button" id="toggle-new" class="absolute right-3 top-2 text-gray-500 dark:text-gray-300">
        
        <svg id="eye-new" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      </button>
    </div>

    
    <div class="relative">
      <input type="password" id="confirm-password" placeholder="Confirm Password" class="w-full px-4 py-2 border rounded-lg dark:bg-gray-700 dark:text-gray-100 border-gray-300 dark:border-gray-600" required>
      <button type="button" id="toggle-confirm" class="absolute right-3 top-2 text-gray-500 dark:text-gray-300">
        <svg id="eye-confirm" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      </button>
    </div>

    <div id="strength-text" class="text-sm"></div>
    
    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg transition-colors duration-300">Reset Password</button>
  </form>
  <p id="message" class="text-center mt-4"></p>
</div>

<script>
  
  const themeToggle = document.getElementById("theme-toggle");
  const html = document.documentElement;
  function setIcon(){ themeToggle.textContent = html.classList.contains("dark") ? "☀️" : "🌙"; }
  themeToggle.addEventListener("click", ()=>{
    html.classList.toggle("dark");
    localStorage.setItem("theme", html.classList.contains("dark")?"dark":"light");
    setIcon();
  });
  if(localStorage.getItem("theme")==="dark") html.classList.add("dark");
  setIcon();

 
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const email = params.get("email");

  const newPass = document.getElementById("new-password");
  const confirmPass = document.getElementById("confirm-password");
  const strengthText = document.getElementById("strength-text");

  const toggleNew = document.getElementById("toggle-new");
  const toggleConfirm = document.getElementById("toggle-confirm");

  
  function toggleEye(input, eye){
    if(input.type==="password"){
      input.type="text";
      eye.classList.add("eye-closed");
    } else {
      input.type="password";
      eye.classList.remove("eye-closed");
    }
  }

  toggleNew.addEventListener("click", ()=>{ toggleEye(newPass, document.getElementById("eye-new")); });
  toggleConfirm.addEventListener("click", ()=>{ toggleEye(confirmPass, document.getElementById("eye-confirm")); });

  newPass.addEventListener("input", ()=>{
    const val = newPass.value;
    let strength = "Weak";
    if(val.length>=8 && /[A-Z]/.test(val) && /[0-9]/.test(val) && /[\W]/.test(val)) strength="Strong";
    else if(val.length>=6) strength="Medium";
    strengthText.textContent = `Strength: ${strength}`;
    strengthText.className = strength==="Weak"?"text-red-500 text-sm":
                               strength==="Medium"?"text-yellow-500 text-sm":"text-green-500 text-sm";
  });

  
  document.getElementById("reset-form").addEventListener("submit", async e=>{
    e.preventDefault();
    const password = newPass.value;
    const confirm = confirmPass.value;
    const msgEl = document.getElementById("message");
    if(password!==confirm){ msgEl.textContent="Passwords do not match!"; msgEl.className="text-red-500 mt-4 text-center"; return; }

    const res = await fetch("/api/auth/reset-password", {

      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({token,email,password})
    });

    const data = await res.json();
    msgEl.textContent = data.message;
    msgEl.className = res.ok?"text-green-500 mt-4 text-center":"text-red-500 mt-4 text-center";
    if(res.ok) setTimeout(()=>{ window.location.href="login.html"; },3000);
  });
</script>
</body>
</html>
