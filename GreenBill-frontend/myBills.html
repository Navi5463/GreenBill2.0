<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bills - GreenBill 2.0</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script> tailwind.config = { darkMode: 'class' };</script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root { --font-heading: 'Poppins', sans-serif; --font-body: 'Inter', sans-serif; }
    h1,h2,h3,h4,.logo { font-family: var(--font-heading); }
    body { font-family: var(--font-body); }
  </style>

  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      if (stored === 'light') document.documentElement.classList.remove('dark');
      else document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
  
  <aside id="sidebar" class="w-72 shrink-0 bg-white/90 dark:bg-gray-800/90 backdrop-blur border-r border-gray-200 dark:border-gray-700 fixed inset-y-0 left-0 flex flex-col z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
    <div class="px-6 py-5 flex items-center justify-between">
      <div class="logo text-2xl font-extrabold">
        <span class="text-green-600 dark:text-green-400">GreenBill</span>
        <span class="text-gray-800 dark:text-gray-200">2.0</span>
      </div>
      <button id="mobile-toggle" class="md:hidden inline-flex items-center justify-center w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600">☰</button>
    </div>
    <nav class="px-3 py-2 space-y-1 text-[15px] mt-2">
      <a href="dashboard.html" class="group flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700">
          <span>🏠</span><span>Dashboard</span>
        </a>
        <a href="myBills.html" class="group flex items-center gap-3 px-3 py-2 rounded-xl bg-green-50 text-green-700 dark:bg-green-900/40 dark:text-green-300 hover:bg-green-100 dark:hover:bg-green-900/60">
          <span>📄</span><span>My Bills</span>
        </a>
        <a href="bill.html" class="group flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700">
          <span>⬆️</span><span>Upload Bill</span>
        </a>
        
        <a href="#" id="helpSupportBtn" class="group flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700">
  <span>🤖</span><span>GreenBot</span>
</a>
      
      <div class="mt-auto px-6 py-4 text-xs text-gray-500 dark:text-gray-400">© 2025 GreenBill 2.0</div>
    </nav>
  </aside>

  
  <div class="flex-1 flex flex-col min-w-0 md:ml-72">
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur border-b border-gray-200 dark:border-gray-700">
      <div class="flex items-center justify-between px-4 md:px-6 py-3">
        <h2 class="text-xl font-bold">📄 My Bills</h2>
        <div class="ml-auto">
          <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-200 dark:bg-gray-700">
            <span id="theme-icon">☀️</span>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-grow p-6">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-4">Uploaded Bills</h2>

        
        <table class="w-full text-sm text-left border-collapse" id="bills-table">
          <thead>
            <tr class="bg-gray-200 dark:bg-gray-700">
              <th class="px-4 py-2">Bill ID</th>
              <th class="px-4 py-2">Amount</th>
              <th class="px-4 py-2">Date</th>
              <th class="px-4 py-2">File</th>
              <th class="px-4 py-2">Action</th>
            </tr>
          </thead>
          <tbody id="bills-tbody" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
        </table>
      </div>
    </main>
  </div>


  <div id="toast" class="fixed bottom-6 right-6 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 transform translate-y-6 transition-all duration-300 z-50">
    ✅ Action completed successfully!
  </div>
  <p></p>

   <div id="chatbotPopup" class="fixed inset-0 bg-black/40 z-50 hidden items-center justify-center">
  <div class="relative w-[360px] h-[500px] bg-white dark:bg-gray-800 rounded-2xl shadow-lg flex flex-col">
    <div class="flex justify-between items-center p-4 bg-green-600 text-white rounded-t-2xl">
      <h1 class="font-bold">💚GreenBot</h1>
      <button id="closeChatbot" class="text-white text-xl font-bold">×</button>
    </div>
    <iframe src="chatbot.html" class="flex-1 w-full h-full rounded-b-2xl" frameborder="0"></iframe>
  </div>
</div>

<script>
const html = document.documentElement;
const themeBtn = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');
const mobileToggle = document.getElementById('mobile-toggle');
const sidebar = document.getElementById('sidebar');
const toast = document.getElementById("toast");

(function() {
    const html = document.documentElement;
    function setIcon() { themeIcon.textContent = html.classList.contains('dark') ? '☀️' : '🌙'; }
    setIcon();
    themeBtn.addEventListener('click', () => {
        html.classList.toggle('dark');
        localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        setIcon();
    });
})();

mobileToggle?.addEventListener('click', ()=> sidebar.classList.toggle('-translate-x-full'));

async function fetchBills() {
    try {
        const token = localStorage.getItem("token");
        if(!token){ alert("⚠️ Please login first!"); return; }

        const res = await fetch("http://localhost:5000/api/bills", {
            headers: { Authorization: `Bearer ${token}` }
        });
        if(!res.ok) throw new Error("Failed to fetch bills");

        const bills = await res.json();
        const tbody = document.getElementById("bills-tbody");
        tbody.innerHTML = "";

        if(bills.length === 0){
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4">No bills uploaded yet</td></tr>`;
            return;
        }

        bills.forEach(bill => {
            const row = document.createElement("tr");

            
            const fileLink = bill.fileUrl
                ? `<a href="http://localhost:5000${bill.fileUrl}" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded">View</a>`
                : 'N/A';

            row.innerHTML = `
                <td class="px-4 py-2">${bill._id}</td>
                <td class="px-4 py-2">₹${bill.amount}</td>
                <td class="px-4 py-2">${new Date(bill.date).toLocaleDateString()}</td>
                <td class="px-4 py-2">${fileLink}</td>
                <td class="px-4 py-2">
                    <button class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-white delete-btn" data-id="${bill._id}">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });

     
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const id = btn.dataset.id;
                if(!confirm("Are you sure you want to delete this bill?")) return;

                try {
                    const res = await fetch(`http://localhost:5000/api/bills/${id}`, {
                        method: "DELETE",
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    if(!res.ok) throw new Error("Delete failed");
                    showToast("✅ Bill deleted successfully!");
                    fetchBills(); 
                } catch (err) {
                    console.error(err);
                    alert("❌ Failed to delete bill");
                }
            });
        });

    } catch (err) {
        console.error(err);
        alert("❌ Error loading bills");
    }
}

function showToast(msg){
    toast.textContent = msg;
    toast.classList.remove("opacity-0","translate-y-6");
    toast.classList.add("opacity-100","translate-y-0");
    setTimeout(() => {
        toast.classList.remove("opacity-100","translate-y-0");
        toast.classList.add("opacity-0","translate-y-6");
    }, 3000);
}

const helpBtn = document.getElementById('helpSupportBtn');
  const chatbotPopup = document.getElementById('chatbotPopup');
  const closeBtn = document.getElementById('closeChatbot');

  helpBtn.addEventListener('click', () => {
    chatbotPopup.classList.remove('hidden');
  });

  closeBtn.addEventListener('click', () => {
    chatbotPopup.classList.add('hidden');
  });

 
  chatbotPopup.addEventListener('click', (e) => {
    if (e.target === chatbotPopup) {
      chatbotPopup.classList.add('hidden');
    }
  });

fetchBills();
</script>

</body>
</html>
